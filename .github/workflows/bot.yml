name: 🤖 Kishor Publisher — Bot

# PRIMARY:  cron-job.org triggers every 1 minute via workflow_dispatch.
# FALLBACK: GitHub cron every 5 minutes (GitHub minimum is 5 min).
# Responds to /commands within ~1 minute.

on:
  schedule:
    - cron: '0 * * * *'  # Fallback: every hour
  workflow_dispatch:        # Primary: triggered by cron-job.org every 1 min

concurrency:
  group: bot
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CRON_JOB_ORG_API_KEY: ${{ secrets.CRON_JOB_ORG_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/bot.py
